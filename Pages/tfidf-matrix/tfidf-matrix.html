      <h1>Matrix Preview</h1>
      <p>Visualisasi subset matriks TF-IDF (N × |V|). Baris = dokumen, kolom = term/fitur.</p>

      <div class="card">

          <div class="card-title">Matriks TF-IDF</div>

            <input type="number" id="doc-idx-inp" value="0" min="0">

          <div style="display:flex;align-items:flex-end;">
            <button class="btn btn-secondary" onclick="loadDocDetail()">Analisis →</button>
          </div>
        </div>
        <div id="doc-detail"></div>
      </div>
