<div class="page-header">
  <!-- <span class="module-tag">// MODUL 3 — KLASIFIKASI SVM</span> -->
  <h1>Klasifikasi SVM</h1>
  <p>Latih model Support Vector Machine dari hasil ekstraksi fitur TF-IDF untuk klasifikasi teks.</p>
</div>
    <div class="card">
      <h3>Konfigurasi SVM (Sequential Minimal Optimization)</h3>
      <div class="flex gap-2 mt-2">
        <select id="svm-target" class="btn" style="min-width: 120px;">
          <option value="">(Pilih Label Target)</option>
        </select>
        <select id="svm-kernel" class="btn">
          <option value="linear">Kernel: Linear</option>
          <option value="rbf">Kernel: RBF (Gaussian)</option>
        </select>
        <input type="number" id="svm-c" value="1.0" step="0.1" class="btn" style="width:80px">
        <button class="btn btn-primary" onclick="trainSVM()">Latih Model</button>
      </div>
      <div id="svm-status" class="mt-2 text-sm text-mute"></div>
    </div>

    <div class="card mt-3">
      <h3>Uji Deteksi Real-time</h3>
      <div class="mt-2">
        <textarea id="input-deteksi" class="input-area" placeholder="Masukkan kalimat untuk dicek..."></textarea>
        <button class="btn btn-primary mt-1" onclick="predictSVM()">Cek Sentimen</button>
      </div>
      <div id="result-area" class="hidden mt-3 p-2" style="border-radius: var(--r); background: var(--surface);">
        <div class="text-sm">Hasil Prediksi:</div>
        <div id="prediction-text" style="font-size: 20px; font-weight: 600;" class="mt-1"></div>
        <div id="prediction-detail" class="text-mute text-sm mt-1"></div>
      </div>
    </div>
